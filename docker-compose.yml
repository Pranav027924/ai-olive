# Local development stack.
# Postgres, Redis, and MinIO per PRD Phase 0.3.
# ClickHouse is added in Phase 7.4 (and switched on via the `analytics` profile).
#
# Bring up: `make up`  (or: docker compose up -d)
# Tear down: `make down` (or: docker compose down)
# Logs:     docker compose logs -f <service>
#
# All services bind to 127.0.0.1 only — never expose them to the LAN by default.

name: ai-olive

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-olive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-olive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olive_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-olive}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-olive} -d ${POSTGRES_DB:-olive}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: ai-olive-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: ai-olive-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-olive}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-olive_dev_pw_minio}
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ClickHouse (Phase 7.4). Off by default; enable with `make up-analytics` or
  # `docker compose --profile analytics up -d`.
  clickhouse:
    image: clickhouse/clickhouse-server:24.10-alpine
    container_name: ai-olive-clickhouse
    restart: unless-stopped
    profiles: ["analytics"]
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-olive}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-olive}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-olive_dev_pw_ch}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "127.0.0.1:8123:8123"   # HTTP
      - "127.0.0.1:9009:9000"   # native TCP (host 9009 to avoid MinIO collision)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clickhouse_data:
