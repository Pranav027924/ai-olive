# Non-secret configuration shared by the app services (PRD §9.10).
# Hostnames are the in-cluster Service names.
apiVersion: v1
kind: ConfigMap
metadata:
  name: olive-config
  namespace: ai-olive
data:
  # Postgres
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "olive"
  POSTGRES_DB: "olive"
  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  # Object storage (MinIO). S3_ACCESS_KEY doubles as the MinIO root user.
  S3_ENDPOINT_URL: "http://minio:9000"
  S3_BUCKET: "olive-attachments"
  S3_REGION: "us-east-1"
  S3_ACCESS_KEY: "olive"
  # ClickHouse
  CLICKHOUSE_URL: "http://clickhouse:8123"
  CLICKHOUSE_USER: "olive"
  CLICKHOUSE_DB: "olive"
  # Inter-service
  INGESTION_URL: "http://ingestion-service:8001/v1/logs"
  # Behaviour
  DISABLE_AUTH: "false"
  WHISPER_MODEL_SIZE: "tiny"
  DEFAULT_PROVIDER: "anthropic"
  DEFAULT_MODEL: "claude-opus-4-7"
