# Ingress (PRD §9.10). Mirrors the dev vite proxy: /api/chat and
# /api/dashboard are stripped of their prefix and routed to the backend
# services; everything else serves the UI.
#
# Assumes the ingress-nginx controller. On a default k3s (Traefik) either
# install ingress-nginx, or replace this with a Traefik IngressRoute +
# StripPrefix middleware (see k8s/README.md).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-olive
  namespace: ai-olive
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-buffering: "off"  # don't buffer SSE
spec:
  ingressClassName: nginx
  rules:
    # Override for your domain (e.g. `kubectl -n ai-olive patch ingress
    # ai-olive --type=json -p '[{"op":"replace","path":"/spec/rules/0/host","value":"olive.example.com"}]'`).
    - host: olive.local
      http:
        paths:
          - path: /api/chat(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: chat-service
                port: { number: 8000 }
          - path: /api/dashboard(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dashboard-service
                port: { number: 8004 }
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ui
                port: { number: 8080 }
