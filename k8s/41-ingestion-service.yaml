apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: ai-olive
spec:
  selector: { app: ingestion-service }
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: ai-olive
spec:
  replicas: 2
  selector:
    matchLabels: { app: ingestion-service }
  template:
    metadata:
      labels: { app: ingestion-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ingestion-service
          image: ai-olive/ingestion-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef: { name: olive-config }
            - secretRef: { name: olive-secrets }
          livenessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health/ready, port: 8001 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "1", memory: "512Mi" }
