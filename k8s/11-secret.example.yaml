# TEMPLATE — copy to 11-secret.yaml, fill real values, and keep it OUT of
# git (11-secret.yaml is gitignored). Apply with `kubectl apply -f`.
#
# In production prefer a sealed-secrets / external-secrets operator over a
# plain Secret; this template is the minimum to get a k3s demo running.
apiVersion: v1
kind: Secret
metadata:
  name: olive-secrets
  namespace: ai-olive
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-postgres"
  # S3_SECRET_KEY doubles as the MinIO root password.
  S3_SECRET_KEY: "change-me-minio-secret"
  CLICKHOUSE_PASSWORD: "change-me-clickhouse"
  # HS256 signing key — must be at least 32 bytes.
  JWT_SECRET: "change-me-jwt-secret-at-least-32-bytes-long"
  # Comma-separated allow-list for zero-downtime rotation.
  INGESTION_API_KEYS: "change-me-ingestion-key"
  # LLM providers (set the ones you use).
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  DEEPSEEK_API_KEY: ""
