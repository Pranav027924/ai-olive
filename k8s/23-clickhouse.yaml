apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: ai-olive
spec:
  selector: { app: clickhouse }
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: ai-olive
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels: { app: clickhouse }
  template:
    metadata:
      labels: { app: clickhouse }
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.10-alpine
          ports:
            - containerPort: 8123
            - containerPort: 9000
          env:
            - name: CLICKHOUSE_DB
              valueFrom: { configMapKeyRef: { name: olive-config, key: CLICKHOUSE_DB } }
            - name: CLICKHOUSE_USER
              valueFrom: { configMapKeyRef: { name: olive-config, key: CLICKHOUSE_USER } }
            - name: CLICKHOUSE_PASSWORD
              valueFrom: { secretKeyRef: { name: olive-secrets, key: CLICKHOUSE_PASSWORD } }
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
          readinessProbe:
            httpGet: { path: /ping, port: 8123 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /ping, port: 8123 }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits: { cpu: "2", memory: "2Gi" }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: { storage: 10Gi }
