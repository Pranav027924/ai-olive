# nginx config for the AI-OLive UI (PRD §9.8).
# Serves the Vite bundle and falls back to index.html so client-side
# routing works on deep links. /api/* is left for the cluster ingress.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets, never the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic hardening headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
