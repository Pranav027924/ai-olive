# nginx for the AI-OLive UI (PRD §9.8).
# Serves the Vite bundle and reverse-proxies the API so the whole app is
# reachable from a single origin (:8080). The upstream names resolve both
# in docker-compose and in the k8s namespace.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Chat API (SSE-friendly: no buffering, long read timeout, keep-alive).
    location /api/chat/ {
        proxy_pass http://chat-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Dashboard API.
    location /api/dashboard/ {
        proxy_pass http://dashboard-service:8004/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Long-cache hashed assets, never the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
